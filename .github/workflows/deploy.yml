name: 🚀 Deploy to Server

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (Password)
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            BRANCH="${GITHUB_REF_NAME}"

            if [ "$BRANCH" = "main" ]; then
              PORT=9030
              ENV=production
            elif [ "$BRANCH" = "staging" ]; then
              PORT=9025
              ENV=staging
            else
              echo "Unsupported branch"
              exit 1
            fi

            echo "🌍 ENV: $ENV"
            echo "🔌 PORT: $PORT"

            cd /www/wwwroot/JHS-Associates-Website || \
            git clone https://github.com/jhsassociatesllp/JHS-Associates-Website.git /www/wwwroot/JHS-Associates-Website

            cd /www/wwwroot/JHS-Associates-Website

            git fetch --all
            git reset --hard origin/$BRANCH

            echo "🛑 Stopping old containers"
            docker compose down || true

            echo "🚀 Starting new containers"
            FRONTEND_PORT=$PORT docker compose up -d --build

            echo "🧹 Cleanup"
            docker system prune -af